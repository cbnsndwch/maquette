<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Musicologia — Object Inspector</title>
        <style>
            :root {
                color-scheme: light dark;
            }
            html,
            body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                font-family:
                    ui-sans-serif, system-ui, -apple-system, sans-serif;
            }
            #app {
                position: fixed;
                inset: 0;
            }
            canvas {
                display: block;
            }
            #panel {
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 10;
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 12px 14px;
                border-radius: 10px;
                background: rgba(20, 24, 28, 0.78);
                color: #f4f1ea;
                font-size: 13px;
                backdrop-filter: blur(6px);
                min-width: 220px;
            }
            #panel h1 {
                font-size: 13px;
                margin: 0 0 2px;
                font-weight: 600;
            }
            #panel label {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
            }
            #panel select {
                flex: 1;
                background: rgba(255, 255, 255, 0.12);
                color: inherit;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 6px;
                padding: 3px 6px;
                font: inherit;
            }
            #panel select option {
                color: #1a1a1a;
            }
            #info {
                opacity: 0.7;
                font-size: 12px;
            }
            #hint {
                position: fixed;
                bottom: 12px;
                left: 12px;
                opacity: 0.55;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <div id="panel">
            <h1>Object Inspector</h1>
            <label>biome <select id="biome"></select></label>
            <label
                >category
                <select id="category">
                    <option value="props">prop</option>
                    <option value="structures">building</option>
                    <option value="surfaces">tile surface</option>
                </select>
            </label>
            <label>object <select id="object"></select></label>
            <div id="info"></div>
        </div>
        <div id="hint">drag to rotate · right-drag to pan · scroll to zoom</div>
        <script type="module" src="/src/inspect.ts"></script>
    </body>
</html>
